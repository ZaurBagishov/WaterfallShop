<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./asset/css/login.css">
    <title>WaterfallShop</title>
</head>
<body>
    <div class="container">
        <div class="form-box login">
            <form action="">
            <h1>Daxil ol</h1>
            <div class="input-box">
                <input type="text" placeholder="İstifadəçi adı" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Şifrə" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="forgot-link">
                <a href="#">Şifrəni unutmusan?</a>
            </div>
            <button type="submit" class="btn">Daxil ol</button>
        </form>
        </div>

        <div class="form-box register">
            <form action="">
            <h1>Qeydiyyat</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Xoş Gəldiniz</h1>
                <p>Hesabınız yoxdur?</p>
                <button class="btn register-btn">Qeydiyyat</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Təkrar xoş Gəldiniz</h1>
                <p>Əvvəl qeydiyyatdan keçmisiniz?</p>
                <button class="btn login-btn">Daxil ol</button>
            </div>
        </div>
    </div>
    <script src="./app.js"></script>
</body>
</html>
